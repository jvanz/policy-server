name: policy-server release
on:
  push:
    tags:
    - 'v*'
jobs:
  ci:
    uses: kubewarden/policy-server/.github/workflows/tests.yml@main
  release:
    name: Create release
    runs-on: ubuntu-latest
    needs:
      - ci
    steps:
      - name: Install cosign
        uses: sigstore/cosign-installer@main

      - name: Checkout code
        uses: actions/checkout@v3

      - name: Generate SBOM
        run: |
          make sbom

      - name: Create release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release policy-server ${{ github.ref }}
          draft: false
          prerelease: ${{ contains(github.ref, '-alpha') || contains(github.ref, '-beta') || contains(github.ref, '-rc') }}
          files: |
            target/_manifest/spdx_2.2/manifest.spdx.json
            target/_manifest/spdx_2.2/manifest.spdx.json.sha256
